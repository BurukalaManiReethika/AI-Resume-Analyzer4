{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}

<div class="card">
    <h2>Create your account</h2>

    <form method="POST">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Jane Doe" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="At least 6 characters" minlength="6" required>

        <button type="submit">Register</button>
    </form>

    <p class="auth-links">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
</div>

{% endblock %}
