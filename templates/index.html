<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>AI Resume Analyzer</h1>

    <form action="/analyze"
          method="POST"
          enctype="multipart/form-data">

        <label>Upload Resume (PDF)</label>
        <br><br>

        <input type="file"
               name="resume"
               accept=".pdf"
               required>

        <br><br>

        <label>Job Description</label>
        <br><br>

        <textarea
            name="job_description"
            rows="10"
            cols="60"
            placeholder="Paste Job Description Here..."
            required></textarea>

        <br><br>

        <button type="submit">
            Analyze Resume
        </button>

    </form>

    <br>

    <a href="/login">
        Login
    </a>

    |

    <a href="/register">
        Register
    </a>

</div>

</body>
</html>
